workflows:
  ios-workflow:
    name: iOS Build Workflow
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      xcode: latest
    scripts:
      - name: Build iOS App (Unsigned)
        script: |
          PROJECT_PATH=$(find . -name "*.xcodeproj" -maxdepth 2 | head -n 1)
          if [ -z "$PROJECT_PATH" ]; then
            echo "Error: No .xcodeproj found!"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          PROJECT_NAME=$(basename "$PROJECT_PATH" .xcodeproj)
          echo "Found project: $PROJECT_PATH"
          echo "Scheme: $PROJECT_NAME"
          
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$PROJECT_NAME" \
            -configuration Release \
            -archivePath $FCI_BUILD_DIR/$PROJECT_NAME.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
      - name: Create Payload and Zip to IPA
        script: |
          PROJECT_PATH=$(find . -name "*.xcodeproj" -maxdepth 2 | head -n 1)
          PROJECT_NAME=$(basename "$PROJECT_PATH" .xcodeproj)
          mkdir -p $FCI_BUILD_DIR/Payload
          cp -r $FCI_BUILD_DIR/$PROJECT_NAME.xcarchive/Products/Applications/$PROJECT_NAME.app $FCI_BUILD_DIR/Payload/
          cd $FCI_BUILD_DIR
          zip -r $PROJECT_NAME.ipa Payload
    artifacts:
      - $FCI_BUILD_DIR/*.ipa
